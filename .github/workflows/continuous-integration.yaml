name: Continuous integration

on:
  pull_request:
    branches: [ master, release* ]

jobs:
  ci:
    runs-on: ${{ matrix.operating-system }}
    if: "!contains(github.event.head_commit.message, 'ci: add updated coverage_badge.svg')"
    concurrency:
      group: ci-${{ matrix.php-version }}-${{ github.ref }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      matrix:
        operating-system: [ ubuntu-22.04 ]
        php-version: [ '8.3' ]
        include:
          - php-version: '8.3'
            # Node 16 is past EOL; use a maintained LTS (tao/views/build declares engines.node >=16).
            node-version: '20'
            coverage: true

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}

      - name: Use Node.js ${{ matrix.node-version }}
        if: ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Validate composer.json and composer.lock
        run: composer validate

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Configure NPM bridge plugin
        run: composer config allow-plugins.oat-sa/composer-npm-bridge $([[ "${{ matrix.node-version }}" ]] && echo "true" || echo "false") --no-interaction --no-plugins

      - name: Install dependencies
        run: composer install --no-progress

      - name: Generate localization files
        if: ${{ matrix.node-version }}
        run: php tao/scripts/tools/GenerateTranslationBundles.php

      - name: Install Chromium dependencies
        if: ${{ matrix.node-version }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fonts-liberation \
            libasound2 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libfontconfig1 \
            libgbm1 \
            libglib2.0-0 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libx11-xcb1 \
            libxcb1 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxkbcommon0 \
            libxrandr2 \
            libxrender1 \
            libxss1 \
            libxtst6

      - name: Install front-end dependencies
        if: ${{ matrix.node-version }}
        working-directory: tao/views/build
        run: npm ci

      - name: Install compatible Chromium for Puppeteer
        if: ${{ matrix.node-version }}
        working-directory: tao/views/build
        run: node node_modules/puppeteer/install.js

      - name: Find Puppeteer Chromium path
        if: ${{ matrix.node-version }}
        id: chromium-path
        working-directory: tao/views/build
        run: |
          CHROME_PATH=$(find ${{ github.workspace }}/tao/views/build/node_modules/puppeteer/.local-chromium -name "chrome" -type f 2>/dev/null | head -1)
          echo "path=$CHROME_PATH" >> $GITHUB_OUTPUT
          echo "Found Chromium at: $CHROME_PATH"
          chmod +x "$CHROME_PATH"

      # grunt-contrib-qunit 3.x drives Puppeteer 1.20 (old Chromium). Split suites + retries avoid flaky
      # "Protocol error (Page.addScriptToEvaluateOnNewDocument): Target closed" on GitHub-hosted runners.
      - name: Configure Puppeteer environment for Grunt
        if: ${{ matrix.node-version }}
        run: |
          {
            echo "PUPPETEER_EXECUTABLE_PATH=${{ steps.chromium-path.outputs.path }}"
            echo "PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true"
            echo "CHROME_BIN=${{ steps.chromium-path.outputs.path }}"
            echo "CHROMIUM_BIN=${{ steps.chromium-path.outputs.path }}"
            echo "GRUNT_CHROME_FLAGS=--no-sandbox --disable-dev-shm-usage --disable-setuid-sandbox --disable-gpu --disable-extensions --disable-background-networking --disable-sync --disable-translate --no-first-run --no-default-browser-check --disable-software-rasterizer"
          } >> "$GITHUB_ENV"

      - name: Front-end tests (pcisamplestest)
        if: ${{ matrix.node-version }}
        continue-on-error: true
        run: bash "${{ github.workspace }}/.github/scripts/run-fe-qunit.sh" pcisamplestest

      - name: Front-end tests (qtiitempcitest)
        if: ${{ matrix.node-version }}
        continue-on-error: true
        run: bash "${{ github.workspace }}/.github/scripts/run-fe-qunit.sh" qtiitempcitest

      - name: Front-end tests (taotest)
        if: ${{ matrix.node-version }}
        continue-on-error: true
        run: bash "${{ github.workspace }}/.github/scripts/run-fe-qunit.sh" taotest

      - name: Front-end tests (taoclientdiagnostictest)
        if: ${{ matrix.node-version }}
        continue-on-error: true
        run: bash "${{ github.workspace }}/.github/scripts/run-fe-qunit.sh" taoclientdiagnostictest

      - name: Front-end tests (taodeliveryrdftest)
        if: ${{ matrix.node-version }}
        continue-on-error: true
        run: bash "${{ github.workspace }}/.github/scripts/run-fe-qunit.sh" taodeliveryrdftest

      - name: Front-end tests (taoitemstest)
        if: ${{ matrix.node-version }}
        continue-on-error: true
        run: bash "${{ github.workspace }}/.github/scripts/run-fe-qunit.sh" taoitemstest

      - name: Front-end tests (taomediamanagertest)
        if: ${{ matrix.node-version }}
        continue-on-error: true
        run: bash "${{ github.workspace }}/.github/scripts/run-fe-qunit.sh" taomediamanagertest

      - name: Front-end tests (taooutcomeuitest)
        if: ${{ matrix.node-version }}
        continue-on-error: true
        run: bash "${{ github.workspace }}/.github/scripts/run-fe-qunit.sh" taooutcomeuitest

      - name: Front-end tests (taoproctoringtest)
        if: ${{ matrix.node-version }}
        continue-on-error: true
        run: bash "${{ github.workspace }}/.github/scripts/run-fe-qunit.sh" taoproctoringtest

      - name: Front-end tests (taoqtiitemtest)
        if: ${{ matrix.node-version }}
        continue-on-error: true
        run: bash "${{ github.workspace }}/.github/scripts/run-fe-qunit.sh" taoqtiitemtest

      - name: Front-end tests (taoqtitesttest)
        if: ${{ matrix.node-version }}
        continue-on-error: true
        run: bash "${{ github.workspace }}/.github/scripts/run-fe-qunit.sh" taoqtitesttest

      - name: Front-end tests (taoqtitestpreviewertest)
        if: ${{ matrix.node-version }}
        continue-on-error: true
        run: bash "${{ github.workspace }}/.github/scripts/run-fe-qunit.sh" taoqtitestpreviewertest

      - name: Front-end tests (taotaskqueuetest)
        if: ${{ matrix.node-version }}
        continue-on-error: true
        run: bash "${{ github.workspace }}/.github/scripts/run-fe-qunit.sh" taotaskqueuetest

      - name: Front-end tests (taoteststest)
        if: ${{ matrix.node-version }}
        continue-on-error: true
        run: bash "${{ github.workspace }}/.github/scripts/run-fe-qunit.sh" taoteststest

      - name: Back-end tests
        run: ./test.sh ${{ matrix.coverage && '-c' }}
        continue-on-error: true

      - name: Publish a back-end test report
        uses: mikepenz/action-junit-report@v3
        id: be-junit
        with:
          report_paths: 'log/*/junit.xml'
          job_summary: false

      - name: Publish a front-end test report
        if: ${{ matrix.node-version }}
        uses: mikepenz/action-junit-report@v3
        id: fe-junit
        with:
          report_paths: junit-reports/**/*.xml
          job_summary: false

      - name: Parse the the back-end reports
        id: report
        run: grep testFailed log/*/teamcity.txt -R > /tmp/failures.txt

      - name: Build back-end coverage report link
        id: report-link
        if: ${{ matrix.coverage }}
        run: echo formatted='[🔗 Coverage report](https://oat-sa.github.io/tao-community/${{ github.head_ref || github.ref_name }})' >> $GITHUB_OUTPUT

      - name: Back-end job summary
        uses: mathiasvr/command-output@v2.0.0
        id: be-summary
        with:
          run: |
            cat << EOF
            # Back-end summary PHP ${{ matrix.php-version }}
            ${{ steps.report-link.outputs.formatted }}
            |💯 Total|✅ Passed|⏭️ Skipped|❌ Failed|
            |-|-|-|-|
            |${{ steps.be-junit.outputs.total }}|${{ steps.be-junit.outputs.passed }}|${{ steps.be-junit.outputs.skipped }}|${{ steps.be-junit.outputs.failed }}|
            EOF
            php ./.github/parse-reports.php

      - name: Front-end job summary
        if: ${{ matrix.node-version }}
        uses: mathiasvr/command-output@v2.0.0
        id: fe-summary
        with:
          run: |
            cat << EOF
            # Front-end summary Node ${{ matrix.node-version }}
            |💯 Total|✅ Passed|⏭️ Skipped|❌ Failed|
            |-|-|-|-|
            |${{ steps.fe-junit.outputs.total }}|${{ steps.fe-junit.outputs.passed }}|${{ steps.fe-junit.outputs.skipped }}|${{ steps.fe-junit.outputs.failed }}|
            EOF
            php ./.github/parse-reports.php

      - uses: peter-evans/find-comment@v2
        id: be-summary-comment
        if: github.event_name == 'pull_request'
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: Back-end summary PHP ${{ matrix.php-version }}

      - uses: peter-evans/find-comment@v2
        id: fe-summary-comment
        if: ${{ github.event_name == 'pull_request' && matrix.node-version }}
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: Front-end summary Node ${{ matrix.node-version }}

      - name: Create or update back-end summary comment
        uses: peter-evans/create-or-update-comment@v2
        if: github.event_name == 'pull_request'
        with:
          comment-id: ${{ steps.be-summary-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.be-summary.outputs.stdout }}
          edit-mode: replace

      - name: Create or update front-end summary comment
        uses: peter-evans/create-or-update-comment@v2
        if: ${{ github.event_name == 'pull_request' && matrix.node-version }}
        with:
          comment-id: ${{ steps.fe-summary-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.fe-summary.outputs.stdout }}
          edit-mode: replace

      - name: Merge coverage reports
        run: vendor/bin/phpunit-merger coverage coverage --html=clover clover.xml
        if: ${{ matrix.coverage }}

      - name: Generate a coverage badge
        uses: timkrase/phpunit-coverage-badge@v1.2.0
        if: ${{ matrix.coverage }}
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push a coverage badge
        uses: EndBug/add-and-commit@v9
        if: ${{ matrix.coverage }}
        with:
          add: coverage_badge.svg
          commit: --signoff
          message: 'ci: add updated coverage_badge.svg'

      - name: Deploy coverage reports
        uses: JamesIves/github-pages-deploy-action@v4
        if: ${{ matrix.coverage }}
        with:
          folder: clover
          target-folder: ${{ github.head_ref || github.ref_name }}
          single-commit: true
          token: ${{ secrets.CI_GITHUB_TOKEN }}

      - name: Back-end job summary
        run: echo "${{ steps.be-summary.outputs.stdout }}" >> $GITHUB_STEP_SUMMARY

      - name: Front-end job summary
        if: ${{ matrix.node-version }}
        run: echo "${{ steps.fe-summary.outputs.stdout }}" >> $GITHUB_STEP_SUMMARY

      - name: Fail the job if back-end tests weren't OK
        run: exit ${{ steps.be-junit.outputs.failed }}

      - name: Fail the job if front-end tests weren't OK
        if: ${{ matrix.node-version }}
        run: exit ${{ steps.fe-junit.outputs.failed }}
